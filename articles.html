<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories & Discoveries — Hui Hui Gwan 回回館</title>
  <meta name="description" content="Explore stories, articles, and discoveries about the shared heritage of Islam and Korea.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="article-styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🏛️</text></svg>">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo" id="nav-logo">
        <div class="nav-logo-icon">回</div>
        <div class="nav-logo-text">
          Hui Hui Gwan
          <span>회회관 · <span data-i18n="nav.subtitle">Islamic Korean Heritage</span></span>
        </div>
      </a>

      <div class="nav-links" id="navLinks">
        <a href="index.html#about" data-i18n="nav.about">About</a>
        <a href="index.html#history" data-i18n="nav.history">History</a>
        <a href="articles.html" data-i18n="nav.stories" class="active">Stories</a>
        <a href="index.html#gallery" data-i18n="nav.gallery">Gallery</a>
        <a href="index.html#products" data-i18n="nav.shop">Heritage Shop</a>
      </div>

      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-switcher-btn" id="langBtn" aria-label="Change language">
          <span class="lang-globe">🌐</span>
          <span class="lang-current" id="langCurrent">EN</span>
          <span class="lang-arrow">▾</span>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <button class="lang-option active" data-lang="en">
            <span class="lang-flag">🇬🇧</span><span>English</span>
          </button>
          <button class="lang-option" data-lang="tr">
            <span class="lang-flag">🇹🇷</span><span>Türkçe</span>
          </button>
          <button class="lang-option" data-lang="ko">
            <span class="lang-flag">🇰🇷</span><span>한국어</span>
          </button>
        </div>
      </div>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="articles-page-header">
    <div class="container">
      <div class="section-label" style="justify-content:center;" data-i18n="articles.label">Stories & Discoveries</div>
      <h1 class="section-title" style="text-align:center;">
        <span id="pageTitle1">Readings for</span> <span class="highlight" id="pageTitle2">Curious Hearts</span>
      </h1>
      <p class="articles-page-subtitle" id="pageSubtitle">
        Writings, research, and cultural reflections on the shared heritage of Islam and Korea.
      </p>
    </div>
  </header>

  <!-- Articles Grid -->
  <main class="articles-page-main">
    <div class="container">
      <div class="articles-page-grid" id="articlesGrid">
        <!-- Populated by JS -->
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none;padding-top:0;">
        <p data-i18n="footer.copyright">© 2026 Hui Hui Gwan 回回館 — All rights reserved</p>
        <p class="sadaqa">صدقة جارية — 사다까 자리야</p>
      </div>
    </div>
  </footer>

  <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

  <script src="translations.js"></script>
  <script src="article-1-goryeo-merchants.js"></script>
  <script src="article-2-soju-arabic-roots.js"></script>
  <script src="article-3-jang-sun-ryong.js"></script>
  <script src="article-4-ssanghwajeom.js"></script>
  <script src="article-5-muslim-scholars.js"></script>
  <script src="article-6-quiet-disappearance.js"></script>
  <script src="articles-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const LANG_LABELS = { en: 'EN', tr: 'TR', ko: '한' };
      const langSwitcher = document.getElementById('langSwitcher');
      const langBtn = document.getElementById('langBtn');
      const langCurrent = document.getElementById('langCurrent');
      const langOptions = document.querySelectorAll('.lang-option');
      let currentLang = localStorage.getItem('hhg-lang') || 'en';

      langBtn.addEventListener('click', (e) => { e.stopPropagation(); langSwitcher.classList.toggle('open'); });
      document.addEventListener('click', (e) => { if (!langSwitcher.contains(e.target)) langSwitcher.classList.remove('open'); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') langSwitcher.classList.remove('open'); });

      langOptions.forEach(opt => {
        opt.addEventListener('click', () => {
          const lang = opt.dataset.lang;
          if (lang !== currentLang) setLanguage(lang);
          langSwitcher.classList.remove('open');
        });
      });

      function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('hhg-lang', lang);
        document.documentElement.lang = lang;
        langCurrent.textContent = LANG_LABELS[lang];
        langOptions.forEach(o => o.classList.toggle('active', o.dataset.lang === lang));

        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (TRANSLATIONS[key]) el.textContent = TRANSLATIONS[key][lang] || TRANSLATIONS[key]['en'];
        });

        renderArticles(lang);
      }

      function renderArticles(lang) {
        const titles = {
          en: ['Readings for', 'Curious Hearts'],
          tr: ['Meraklı Kalpler İçin', 'Okumalar'],
          ko: ['호기심 가득한 마음을 위한', '읽을거리']
        };
        const subtitles = {
          en: 'Writings, research, and cultural reflections on the shared heritage of Islam and Korea.',
          tr: 'İslam ve Kore\'nin ortak mirasına dair yazılar, araştırmalar ve kültürel yansımalar.',
          ko: '이슬람과 한국의 공유된 유산에 대한 글, 연구, 문화적 성찰.'
        };
        const readLabels = { en: 'Read the story →', tr: 'Hikâyeyi oku →', ko: '이야기 읽기 →' };

        document.getElementById('pageTitle1').textContent = titles[lang][0];
        document.getElementById('pageTitle2').textContent = titles[lang][1];
        document.getElementById('pageSubtitle').textContent = subtitles[lang];

        const grid = document.getElementById('articlesGrid');
        grid.innerHTML = ARTICLES.map((article, i) => `
          <a href="article.html?id=${article.id}" class="ap-card ${article.featured ? 'ap-card-featured' : ''}" style="animation-delay: ${i * 0.1}s">
            <div class="ap-card-image">
              <img src="${article.image}" alt="${article.title[lang]}">
              <div class="ap-card-category">${article.category[lang]}</div>
            </div>
            <div class="ap-card-body">
              <div class="ap-card-meta">
                <span>${new Date(article.date).toLocaleDateString(
                  lang === 'ko' ? 'ko-KR' : lang === 'tr' ? 'tr-TR' : 'en-US',
                  { year: 'numeric', month: 'short', day: 'numeric' }
                )}</span>
                <span>·</span>
                <span>${article.readTime[lang]}</span>
              </div>
              <h2 class="ap-card-title">${article.title[lang]}</h2>
              <p class="ap-card-excerpt">${article.excerpt[lang]}</p>
              <span class="ap-card-link">${readLabels[lang]}</span>
            </div>
          </a>
        `).join('');
      }

      setLanguage(currentLang);

      // Mobile nav
      const navToggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');
      navToggle.addEventListener('click', () => {
        navLinks.classList.toggle('open');
        const spans = navToggle.querySelectorAll('span');
        if (navLinks.classList.contains('open')) {
          spans[0].style.transform = 'translateY(7px) rotate(45deg)';
          spans[1].style.opacity = '0';
          spans[2].style.transform = 'translateY(-7px) rotate(-45deg)';
        } else {
          spans.forEach(s => { s.style.transform = 'none'; s.style.opacity = '1'; });
        }
      });

      // Back to top
      const backToTop = document.getElementById('backToTop');
      window.addEventListener('scroll', () => backToTop.classList.toggle('visible', window.scrollY > 400), { passive: true });
      backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    });
  </script>
</body>
</html>
